<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeamiento · PNFT Articulador</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar (igual) -->
        <aside class="sidebar">... (mantén tu sidebar igual) ...</aside>

        <main class="main-content">
            <div class="top-bar">...</div>

            <!-- Selectores -->
            <div class="recent-section">
                <h2>1. Seleccionar nivel y módulo</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                    <div>
                        <label><strong>Ciclo:</strong></label>
                        <select id="cicloSelect" style="width:100%; padding:0.5rem;">
                            <option value="">-- Seleccione --</option>
                            <option value="preescolar">Preescolar</option>
                        </select>
                    </div>
                    <div>
                        <label><strong>Nivel:</strong></label>
                        <select id="nivelSelect" style="width:100%; padding:0.5rem;">
                            <option value="Educación Preescolar">Educación Preescolar</option>
                        </select>
                    </div>
                    <div>
                        <label><strong>Módulo:</strong></label>
                        <select id="moduloSelect" style="width:100%; padding:0.5rem;">
                            <option value="1">Módulo 1</option>
                            <option value="2">Módulo 2</option>
                        </select>
                    </div>
                </div>
                <button id="cargarBtn" style="margin-top:1rem; background:#2E7D32; color:white; padding:0.5rem 1rem; border:none; border-radius:4px;">
                    <i class="fas fa-download"></i> Cargar indicadores
                </button>
            </div>

            <div id="indicadoresContainer" class="recent-section" style="display: none;">
                <h2>2. Indicadores de logro</h2>
                <div id="indicadoresList"></div>
            </div>
        </main>
    </div>

    <script>
        // ===== DATOS CURRICULARES MÍNIMOS (AQUÍ MISMO) =====
        const CURRICULO = {
            preescolar: [
                {
                    nivel: 'Educación Preescolar',
                    modulo: 1,
                    areas: [
                        {
                            areaId: 'apropiacion',
                            saberesConceptuales: [
                                { concepto: 'Computadora', indicadorLogro: 'Identificar qué es una computadora.' },
                                { concepto: 'Software', indicadorLogro: 'Reconocer elementos del software.' }
                            ]
                        },
                        {
                            areaId: 'programacion',
                            saberesConceptuales: [
                                { concepto: 'Evento', indicadorLogro: 'Reconocer eventos causa-efecto.' }
                            ]
                        }
                    ]
                },
                {
                    nivel: 'Educación Preescolar',
                    modulo: 2,
                    areas: [
                        {
                            areaId: 'apropiacion',
                            saberesConceptuales: [
                                { concepto: 'Conexión Bluetooth', indicadorLogro: 'Reconocer conexión entre dispositivos.' }
                            ]
                        }
                    ]
                }
            ]
        };

        const AREAS_CONOCIMIENTO = [
            { id: 'apropiacion', nombre: 'Apropiación Tecnológica' },
            { id: 'programacion', nombre: 'Programación y Algoritmos' }
        ];

        // ===== LÓGICA =====
        document.getElementById('cargarBtn').addEventListener('click', function() {
            const nivel = document.getElementById('nivelSelect').value;
            const modulo = parseInt(document.getElementById('moduloSelect').value);

            const moduloData = CURRICULO.preescolar.find(m => m.nivel === nivel && m.modulo === modulo);

            if (!moduloData) {
                document.getElementById('indicadoresList').innerHTML = '<p>No hay indicadores.</p>';
                document.getElementById('indicadoresContainer').style.display = 'block';
                return;
            }

            let html = '';
            moduloData.areas.forEach(area => {
                const areaNombre = AREAS_CONOCIMIENTO.find(a => a.id === area.areaId)?.nombre || area.areaId;
                html += `<h4>${areaNombre}</h4>`;
                area.saberesConceptuales.forEach(s => {
                    html += `<p><strong>${s.concepto}:</strong> ${s.indicadorLogro}</p>`;
                });
            });

            document.getElementById('indicadoresList').innerHTML = html;
            document.getElementById('indicadoresContainer').style.display = 'block';
        });
    </script>
</body>
</html>
