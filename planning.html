<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeamiento · PNFT Articulador</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- Intentamos cargar curriculum.js -->
    <script src="js/curriculum.js"></script>
</head>
<body>
    <div class="app">
        <!-- Sidebar (mantén tu sidebar aquí) -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">PNFT</div>
                <h2>Articulador 2026</h2>
                <p>MEP Costa Rica</p>
            </div>
            <ul class="nav-menu">
                <a href="index.html" style="text-decoration: none; color: inherit;"><li class="nav-item"><i class="fas fa-chart-pie"></i> Tablero</li></a>
                <a href="planning.html" style="text-decoration: none; color: inherit;"><li class="nav-item active"><i class="fas fa-clipboard-list"></i> Planeamiento</li></a>
                <a href="evaluation.html" style="text-decoration: none; color: inherit;"><li class="nav-item"><i class="fas fa-check-circle"></i> Evaluación</li></a>
                <a href="logbook.html" style="text-decoration: none; color: inherit;"><li class="nav-item"><i class="fas fa-book-open"></i> Bitácora</li></a>
                <a href="students.html" style="text-decoration: none; color: inherit;"><li class="nav-item"><i class="fas fa-users"></i> Estudiantes</li></a>
                <a href="groups.html" style="text-decoration: none; color: inherit;"><li class="nav-item"><i class="fas fa-layer-group"></i> Grupos</li></a>
                <a href="settings.html" style="text-decoration: none; color: inherit;"><li class="nav-item"><i class="fas fa-cog"></i> Configuración</li></a>
            </ul>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title">Planeamiento Didáctico</h1>
                <div class="user-info">
                    <span class="user-badge"><i class="fas fa-user-graduate"></i> Docente</span>
                    <span class="user-badge"><i class="fas fa-calendar-alt"></i> 2026</span>
                </div>
            </div>

            <!-- Selectores (simplificados solo a preescolar por ahora) -->
            <div class="recent-section">
                <h2>1. Seleccionar nivel y módulo</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                    <div>
                        <label><strong>Ciclo:</strong></label>
                        <select id="cicloSelect" style="width:100%; padding:0.5rem;">
                            <option value="">-- Seleccione --</option>
                            <option value="preescolar" selected>Preescolar</option>
                        </select>
                    </div>
                    <div>
                        <label><strong>Nivel:</strong></label>
                        <select id="nivelSelect" style="width:100%; padding:0.5rem;">
                            <option value="Educación Preescolar">Educación Preescolar</option>
                        </select>
                    </div>
                    <div>
                        <label><strong>Módulo:</strong></label>
                        <select id="moduloSelect" style="width:100%; padding:0.5rem;">
                            <option value="1">Módulo 1</option>
                            <option value="2">Módulo 2</option>
                        </select>
                    </div>
                </div>
                <button id="cargarBtn" style="margin-top:1rem; background:#2E7D32; color:white; padding:0.5rem 1rem; border:none; border-radius:4px;">
                    <i class="fas fa-download"></i> Cargar indicadores
                </button>
            </div>

            <div id="indicadoresContainer" class="recent-section" style="display: none;">
                <h2>2. Indicadores de logro</h2>
                <div id="indicadoresList"></div>
            </div>
        </main>
    </div>

    <script>
        console.log('🚀 planning.html iniciado');

        // Verificar si window.CURRICULO existe después de cargar curriculum.js
        setTimeout(function() {
            console.log('🔍 Verificando window.CURRICULO...');
            if (window.CURRICULO) {
                console.log('✅ window.CURRICULO está definido');
                console.log('📚 Datos disponibles:', Object.keys(window.CURRICULO));
            } else {
                console.error('❌ window.CURRICULO NO está definido');
                console.log('💡 Posibles causas:');
                console.log('   - curriculum.js no se cargó (ruta incorrecta)');
                console.log('   - curriculum.js tiene errores de sintaxis');
                console.log('   - curriculum.js no asigna a window.CURRICULO');
            }
        }, 500); // Esperamos medio segundo a que cargue el script

        // Lógica de carga de indicadores (usando window.CURRICULO si existe)
        document.getElementById('cargarBtn').addEventListener('click', function() {
            console.log('🖱️ Botón clickeado');

            if (!window.CURRICULO) {
                alert('Error: window.CURRICULO no está definido. Revisa la consola (F12).');
                return;
            }

            const nivel = document.getElementById('nivelSelect').value;
            const modulo = parseInt(document.getElementById('moduloSelect').value);

            console.log('🔍 Buscando:', { nivel, modulo });

            // Buscar en preescolar
            const moduloData = window.CURRICULO.preescolar?.find(m => m.nivel === nivel && m.modulo === modulo);

            console.log('📦 Resultado:', moduloData);

            if (!moduloData) {
                document.getElementById('indicadoresList').innerHTML = '<p>No hay indicadores para esta combinación.</p>';
                document.getElementById('indicadoresContainer').style.display = 'block';
                return;
            }

            let html = '';
            moduloData.areas.forEach(area => {
                const areaNombre = window.AREAS_CONOCIMIENTO?.find(a => a.id === area.areaId)?.nombre || area.areaId;
                html += `<h4 style="margin-top:1rem; color:#2E7D32;">${areaNombre}</h4>`;
                area.saberesConceptuales.forEach(s => {
                    html += `<p><strong>${s.concepto}:</strong> ${s.indicadorLogro}</p>`;
                });
            });

            document.getElementById('indicadoresList').innerHTML = html;
            document.getElementById('indicadoresContainer').style.display = 'block';
        });
    </script>
</body>
</html>
