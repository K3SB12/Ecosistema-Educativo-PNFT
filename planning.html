<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeamiento · PNFT Articulador</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- Cargar el currículo (asegurar ruta correcta) -->
    <script src="js/curriculum.js" defer></script>
</head>
<body>
    <div class="app">
        <!-- Sidebar (copiada de index.html con active en Planeamiento) -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">PNFT</div>
                <h2>Articulador 2026</h2>
                <p>MEP Costa Rica</p>
            </div>
            <ul class="nav-menu">
                <a href="index.html" style="text-decoration: none; color: inherit;">
                    <li class="nav-item"><i class="fas fa-chart-pie"></i> Tablero</li>
                </a>
                <a href="planning.html" style="text-decoration: none; color: inherit;">
                    <li class="nav-item active"><i class="fas fa-clipboard-list"></i> Planeamiento</li>
                </a>
                <a href="evaluation.html" style="text-decoration: none; color: inherit;">
                    <li class="nav-item"><i class="fas fa-check-circle"></i> Evaluación</li>
                </a>
                <a href="logbook.html" style="text-decoration: none; color: inherit;">
                    <li class="nav-item"><i class="fas fa-book-open"></i> Bitácora</li>
                </a>
                <a href="students.html" style="text-decoration: none; color: inherit;">
                    <li class="nav-item"><i class="fas fa-users"></i> Estudiantes</li>
                </a>
                <a href="groups.html" style="text-decoration: none; color: inherit;">
                    <li class="nav-item"><i class="fas fa-layer-group"></i> Grupos</li>
                </a>
                <a href="settings.html" style="text-decoration: none; color: inherit;">
                    <li class="nav-item"><i class="fas fa-cog"></i> Configuración</li>
                </a>
            </ul>
        </aside>

        <!-- Contenido principal -->
        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title">Planeamiento Didáctico</h1>
                <div class="user-info">
                    <span class="user-badge"><i class="fas fa-user-graduate"></i> Docente</span>
                    <span class="user-badge"><i class="fas fa-calendar-alt"></i> 2026</span>
                </div>
            </div>

            <!-- Selectores -->
            <div class="recent-section">
                <h2>1. Seleccionar nivel y módulo</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div>
                        <label><strong>Ciclo:</strong></label>
                        <select id="cicloSelect" style="width:100%; padding:0.5rem;">
                            <option value="">-- Seleccione --</option>
                            <option value="preescolar">Preescolar</option>
                            <option value="primaria">I Ciclo</option>
                            <option value="primaria">II Ciclo</option>
                            <option value="secundaria">III Ciclo</option>
                        </select>
                    </div>
                    <div>
                        <label><strong>Nivel:</strong></label>
                        <select id="nivelSelect" style="width:100%; padding:0.5rem;">
                            <option value="">-- Primero seleccione ciclo --</option>
                        </select>
                    </div>
                    <div>
                        <label><strong>Módulo:</strong></label>
                        <select id="moduloSelect" style="width:100%; padding:0.5rem;">
                            <option value="1">Módulo 1</option>
                            <option value="2">Módulo 2</option>
                        </select>
                    </div>
                </div>
                <button id="cargarBtn" style="background:#2E7D32; color:white; padding:0.5rem 1rem; border:none; border-radius:4px; cursor:pointer;">
                    <i class="fas fa-download"></i> Cargar indicadores
                </button>
            </div>

            <!-- Contenedor para los indicadores -->
            <div id="indicadoresContainer" class="recent-section" style="display: none;">
                <h2>2. Indicadores de logro</h2>
                <div id="indicadoresList"></div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const cicloSelect = document.getElementById('cicloSelect');
            const nivelSelect = document.getElementById('nivelSelect');
            const moduloSelect = document.getElementById('moduloSelect');
            const cargarBtn = document.getElementById('cargarBtn');
            const indicadoresContainer = document.getElementById('indicadoresContainer');
            const indicadoresList = document.getElementById('indicadoresList');

            // Definir niveles por ciclo (basado en getNiveles de curriculum.js)
            const nivelesPorCiclo = {
                preescolar: ['Educación Preescolar'],
                primaria: {
                    'I Ciclo': ['Primero', 'Segundo', 'Tercero'],
                    'II Ciclo': ['Cuarto', 'Quinto', 'Sexto']
                },
                secundaria: ['Sétimo', 'Octavo', 'Noveno']
            };

            // Cuando cambia el ciclo, actualizar niveles
            cicloSelect.addEventListener('change', function() {
                const ciclo = this.value;
                nivelSelect.innerHTML = '<option value="">-- Seleccione nivel --</option>';
                
                if (ciclo === 'preescolar') {
                    nivelesPorCiclo.preescolar.forEach(n => {
                        nivelSelect.innerHTML += `<option value="${n}">${n}</option>`;
                    });
                } else if (ciclo === 'primaria') {
                    // Para I y II ciclo, necesitamos distinguir, por ahora simplificamos
                    // Esto lo refinaremos después
                    nivelesPorCiclo.primaria['I Ciclo'].forEach(n => {
                        nivelSelect.innerHTML += `<option value="${n}">${n} (I Ciclo)</option>`;
                    });
                    nivelesPorCiclo.primaria['II Ciclo'].forEach(n => {
                        nivelSelect.innerHTML += `<option value="${n}">${n} (II Ciclo)</option>`;
                    });
                } else if (ciclo === 'secundaria') {
                    nivelesPorCiclo.secundaria.forEach(n => {
                        nivelSelect.innerHTML += `<option value="${n}">${n}</option>`;
                    });
                }
            });

            cargarBtn.addEventListener('click', function() {
                const ciclo = cicloSelect.value;
                const nivel = nivelSelect.value;
                const modulo = parseInt(moduloSelect.value);

                if (!ciclo || !nivel) {
                    alert('Seleccione ciclo y nivel');
                    return;
                }

                // Buscar el módulo en la estructura del CURRICULO (global)
                let moduloData = null;
                
                if (ciclo === 'preescolar') {
                    moduloData = CURRICULO.preescolar.find(m => m.nivel === nivel && m.modulo === modulo);
                } else if (ciclo === 'primaria') {
                    // Determinar si es I o II ciclo por el nivel
                    const nivelKey = nivel.toLowerCase();
                    // Buscar en primaria
                    if (CURRICULO.primaria[nivelKey]) {
                        moduloData = CURRICULO.primaria[nivelKey].find(m => m.modulo === modulo);
                    }
                } else if (ciclo === 'secundaria') {
                    const nivelMap = {
                        'Sétimo': 'setimo',
                        'Octavo': 'octavo',
                        'Noveno': 'noveno'
                    };
                    const nivelKey = nivelMap[nivel];
                    if (nivelKey && CURRICULO.secundaria[nivelKey]) {
                        moduloData = CURRICULO.secundaria[nivelKey].find(m => m.modulo === modulo);
                    }
                }

                if (!moduloData) {
                    indicadoresList.innerHTML = '<p>No hay indicadores para esta combinación.</p>';
                    indicadoresContainer.style.display = 'block';
                    return;
                }

                // Mostrar indicadores
                let html = '';
                moduloData.areas.forEach(area => {
                    // Obtener nombre del área desde AREAS_CONOCIMIENTO si está disponible
                    const areaNombre = window.AREAS_CONOCIMIENTO?.find(a => a.id === area.areaId)?.nombre || area.areaId;
                    html += `<h3 style="margin-top:1rem; color:#2E7D32;">${areaNombre}</h3>`;
                    area.saberesConceptuales.forEach(s => {
                        html += `<div style="padding:0.5rem; border-bottom:1px dashed #ccc;">• <strong>${s.concepto}:</strong> ${s.indicadorLogro}</div>`;
                    });
                });

                indicadoresList.innerHTML = html;
                indicadoresContainer.style.display = 'block';
            });
        });
    </script>
</body>
</html>
