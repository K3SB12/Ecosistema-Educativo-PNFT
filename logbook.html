<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bitácora - PNFT</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-content">
        <h1>Bitácora docente</h1>
        
        <div class="card">
            <div class="card-title">Nueva entrada</div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" id="bitacoraFecha" value="">
                </div>
                <div class="form-group">
                    <label>Grupo</label>
                    <select id="bitacoraGrupo">
                        <!-- Llenar con grupos -->
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Planeamiento vinculado</label>
                <select id="bitacoraPlaneamiento">
                    <option value="">Ninguno</option>
                </select>
            </div>
            <div class="form-group">
                <label>Estudiantes presentes / Total</label>
                <div class="flex-row">
                    <input type="number" id="presentes" placeholder="Presentes" style="width:100px;">
                    <span>/</span>
                    <input type="number" id="totalEstudiantes" placeholder="Total" style="width:100px;">
                </div>
            </div>
            <div class="form-group">
                <label>¿Qué funcionó?</label>
                <textarea id="queFunciono" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>¿Qué no funcionó?</label>
                <textarea id="queNoFunciono" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>¿Qué puedo mejorar?</label>
                <textarea id="queMejorar" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>Análisis de tiempo (planificado vs real)</label>
                <div class="grid-2">
                    <input type="text" placeholder="Inicio planificado" id="inicioPlan">
                    <input type="text" placeholder="Inicio real" id="inicioReal">
                    <input type="text" placeholder="Desarrollo planificado" id="desarrolloPlan">
                    <input type="text" placeholder="Desarrollo real" id="desarrolloReal">
                    <input type="text" placeholder="Cierre planificado" id="cierrePlan">
                    <input type="text" placeholder="Cierre real" id="cierreReal">
                </div>
            </div>
            <div class="form-group">
                <label>Incidencias por estudiante</label>
                <textarea id="incidencias" rows="3" placeholder="Ej: Juan Pérez - Tarea no entregada - Se contactó al encargado"></textarea>
            </div>
            <button onclick="guardarBitacora()">💾 Guardar entrada</button>
        </div>
        
        <div class="card">
            <div class="card-title">Filtros</div>
            <div class="flex-row">
                <select id="filtroGrupo">
                    <option value="">Todos los grupos</option>
                </select>
                <input type="date" id="filtroFecha">
                <select id="filtroEstudiante">
                    <option value="">Todos los estudiantes</option>
                </select>
                <button onclick="aplicarFiltros()">🔍 Aplicar</button>
                <button class="secondary" onclick="limpiarFiltros()">🗑️ Limpiar</button>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">Entradas de bitácora</div>
            <table id="tablaBitacora">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Grupo</th>
                        <th>Qué funcionó</th>
                        <th>Incidencias</th>
                    </tr>
                </thead>
                <tbody id="bitacoraBody">
                    <!-- Se llena dinámicamente -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        (function() {
            const fechaInput = document.getElementById('bitacoraFecha');
            const hoy = new Date().toISOString().split('T')[0];
            fechaInput.value = hoy;
            
            // Cargar grupos y planeamientos
            async function cargarGruposYPlaneamientos() {
                const grupos = await window.dbAPI.obtenerGrupos();
                const grupoSelect = document.getElementById('bitacoraGrupo');
                const filtroGrupo = document.getElementById('filtroGrupo');
                grupoSelect.innerHTML = grupos.map(g => `<option value="${g.id}">${g.nombre}</option>`).join('');
                filtroGrupo.innerHTML = '<option value="">Todos los grupos</option>' + grupos.map(g => `<option value="${g.id}">${g.nombre}</option>`).join('');
                
                const planeamientos = await window.dbAPI.obtenerPlaneamientos();
                const planningSelect = document.getElementById('bitacoraPlaneamiento');
                planningSelect.innerHTML = '<option value="">Ninguno</option>' + planeamientos.slice(-10).map(p => 
                    `<option value="${p.id}">${p.datosAdministrativos?.nivel || ''} - ${p.fecha?.slice(0,10) || ''}</option>`
                ).join('');
                
                // Cargar estudiantes para filtro
                const estudiantes = await window.dbAPI.obtenerEstudiantes();
                const filtroEst = document.getElementById('filtroEstudiante');
                filtroEst.innerHTML = '<option value="">Todos los estudiantes</option>' + estudiantes.map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');
                
                cargarBitacora();
            }
            cargarGruposYPlaneamientos();
            
            window.guardarBitacora = async function() {
                const entrada = {
                    id: Date.now(),
                    fecha: fechaInput.value,
                    grupoId: document.getElementById('bitacoraGrupo').value,
                    planningId: document.getElementById('bitacoraPlaneamiento').value || null,
                    presentes: document.getElementById('presentes').value,
                    total: document.getElementById('totalEstudiantes').value,
                    funciono: document.getElementById('queFunciono').value,
                    noFunciono: document.getElementById('queNoFunciono').value,
                    mejorar: document.getElementById('queMejorar').value,
                    tiempo: {
                        inicioPlan: document.getElementById('inicioPlan').value,
                        inicioReal: document.getElementById('inicioReal').value,
                        desarrolloPlan: document.getElementById('desarrolloPlan').value,
                        desarrolloReal: document.getElementById('desarrolloReal').value,
                        cierrePlan: document.getElementById('cierrePlan').value,
                        cierreReal: document.getElementById('cierreReal').value
                    },
                    incidencias: document.getElementById('incidencias').value
                };
                
                await window.dbAPI.guardarBitacora(entrada);
                alert('✅ Entrada guardada');
                cargarBitacora();
                // Limpiar formulario (opcional)
            };
            
            async function cargarBitacora() {
                const entradas = await window.dbAPI.obtenerBitacora();
                const grupos = await window.dbAPI.obtenerGrupos();
                const grupoMap = Object.fromEntries(grupos.map(g => [g.id, g.nombre]));
                
                const tbody = document.getElementById('bitacoraBody');
                tbody.innerHTML = entradas.slice(-20).reverse().map(e => {
                    const grupoNombre = grupoMap[e.grupoId] || 'Desconocido';
                    return `
                        <tr>
                            <td>${e.fecha}</td>
                            <td>${grupoNombre}</td>
                            <td>${(e.funciono || '').substring(0,50)}${e.funciono?.length > 50 ? '...' : ''}</td>
                            <td>${(e.incidencias || '').substring(0,50)}</td>
                        </tr>
                    `;
                }).join('');
            }
            
            window.aplicarFiltros = async function() {
                const grupoId = document.getElementById('filtroGrupo').value;
                const fecha = document.getElementById('filtroFecha').value;
                const estudianteId = document.getElementById('filtroEstudiante').value;
                
                let entradas = await window.dbAPI.obtenerBitacora();
                
                if (grupoId) entradas = entradas.filter(e => e.grupoId == grupoId);
                if (fecha) entradas = entradas.filter(e => e.fecha === fecha);
                if (estudianteId) entradas = entradas.filter(e => e.incidencias?.includes(estudianteId)); // simple
                
                const grupos = await window.dbAPI.obtenerGrupos();
                const grupoMap = Object.fromEntries(grupos.map(g => [g.id, g.nombre]));
                
                const tbody = document.getElementById('bitacoraBody');
                tbody.innerHTML = entradas.slice(-20).reverse().map(e => `
                    <tr>
                        <td>${e.fecha}</td>
                        <td>${grupoMap[e.grupoId] || 'Desconocido'}</td>
                        <td>${(e.funciono || '').substring(0,50)}</td>
                        <td>${(e.incidencias || '').substring(0,50)}</td>
                    </tr>
                `).join('');
            };
            
            window.limpiarFiltros = function() {
                document.getElementById('filtroGrupo').value = '';
                document.getElementById('filtroFecha').value = '';
                document.getElementById('filtroEstudiante').value = '';
                cargarBitacora();
            };
        })();
    </script>
</body>
</html>
