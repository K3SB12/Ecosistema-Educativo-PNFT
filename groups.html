<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Secciones - PNFT Articulador</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos originales de Registra Profe (se mantienen) */
        body { background-color: #f8fafc; }
        .sidebar { background: linear-gradient(180deg, #1e5a20 0%, #2E7D32 100%); }
        .nav-item.active { background: white; color: #2E7D32; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.2); }
        .nav-item.active i { color: #2E7D32; }
        .btn-accion { background: #2E7D32; transition: all 0.2s; }
        .btn-accion:hover { background: #1e5a20; transform: translateY(-2px); }
        .btn-secundario { background: #f0f0f0; color: #333; border: 1px solid #ccc; }
        .btn-secundario:hover { background: #e0e0e0; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); overflow: auto; }
        .modal-content { background-color: white; margin: 5% auto; padding: 2rem; border-radius: 24px; width: 90%; max-width: 800px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); position: relative; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: black; }
        .group-card { transition: all 0.2s; }
        .group-card:hover { transform: translateY(-2px); box-shadow: 0 20px 30px -10px rgba(46,125,50,0.15); }
        .periodo-item { background: #f9fafb; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #e5e7eb; }
        .group-action-btn { background: #f1f5f9; border: none; border-radius: 30px; padding: 0.4rem 0.8rem; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: #1e293b; display: inline-flex; align-items: center; gap: 0.4rem; }
        .group-action-btn i { font-size: 0.8rem; color: #2E7D32; }
        .group-action-btn:hover { background: #e2e8f0; transform: translateY(-2px); }
        .group-main-actions .btn-sm { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 20px; padding: 0.3rem 0.8rem; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
        .group-main-actions .btn-sm i { margin-right: 0.3rem; }
        .group-main-actions .btn-sm:hover { background: #e2e8f0; }
        .group-main-actions .btn-danger { background: #fee2e2; border-color: #fecaca; color: #b91c1c; }
        .group-main-actions .btn-danger:hover { background: #fecaca; }
    </style>
</head>
<body class="font-sans antialiased">
    <div class="flex min-h-screen">
        <aside class="w-72 bg-gradient-to-b from-green-800 to-green-700 text-white flex-shrink-0 sticky top-0 h-screen overflow-y-auto">
            <div class="text-center py-8 border-b border-white/20">
                <div class="w-20 h-20 bg-white/10 rounded-full flex items-center justify-center text-3xl font-bold mx-auto mb-4 border-2 border-white/20">PNFT</div>
                <h2 class="text-xl font-semibold">Articulador 2026</h2>
                <p class="text-sm opacity-80">MEP Costa Rica</p>
            </div>
            <ul class="mt-6 space-y-1 px-4">
                <a href="index.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10"><i class="fas fa-chart-pie w-5"></i> Tablero</li></a>
                <a href="planning.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10"><i class="fas fa-clipboard-list w-5"></i> Planeamiento</li></a>
                <a href="progresion.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10"><i class="fas fa-road w-5"></i> Progresión</li></a>
                <a href="evaluation.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10"><i class="fas fa-check-circle w-5"></i> Evaluación</li></a>
                <a href="logbook.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10"><i class="fas fa-book-open w-5"></i> Bitácora</li></a>
                <a href="students.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10"><i class="fas fa-users w-5"></i> Estudiantes</li></a>
                <a href="groups.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl bg-white text-green-800 font-semibold shadow-md"><i class="fas fa-layer-group w-5"></i> Secciones</li></a>
                <a href="settings.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10"><i class="fas fa-cog w-5"></i> Configuración</li></a>
            </ul>
        </aside>

        <main class="flex-1 p-8 bg-gray-50">
            <div class="flex justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm">
                <h1 class="text-2xl font-bold text-gray-800">Secciones</h1>
                <div class="flex gap-4">
                    <span class="bg-green-100 text-green-800 px-4 py-2 rounded-full text-sm font-medium flex items-center gap-2"><i class="fas fa-user-graduate"></i> Docente</span>
                    <span class="bg-green-100 text-green-800 px-4 py-2 rounded-full text-sm font-medium flex items-center gap-2"><i class="fas fa-calendar-alt"></i> 2026</span>
                </div>
            </div>

            <div class="flex flex-wrap justify-between items-center gap-4 mb-8">
                <div class="flex gap-3">
                    <button id="exportBackupBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow transition flex items-center gap-2"><i class="fas fa-download"></i> Exportar respaldo</button>
                    <button id="importBackupBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg shadow transition flex items-center gap-2"><i class="fas fa-upload"></i> Importar respaldo</button>
                </div>
                <button id="agregarSeccionBtn" class="bg-green-800 hover:bg-green-900 text-white px-5 py-2 rounded-lg shadow flex items-center gap-2"><i class="fas fa-plus"></i> Agregar Sección</button>
            </div>

            <div class="bg-white p-6 border border-gray-200 rounded-xl shadow-sm mb-8">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1"> Institución </label>
                        <select id="filtroInstitucion" class="w-full border-gray-300 rounded-lg py-2 focus:ring-green-500 focus:border-green-500"><option value="todos">Todas las Instituciones</option></select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1"> Nivel </label>
                        <select id="filtroNivel" class="w-full border-gray-300 rounded-lg py-2 focus:ring-green-500 focus:border-green-500"><option value="todos">Todos los Niveles</option></select>
                    </div>
                    <div class="flex items-end"><button id="limpiarFiltrosBtn" class="w-full px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg transition"> Limpiar filtros </button></div>
                </div>
            </div>

            <div id="gruposContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <!-- Modal para crear/editar grupo (con períodos) -->
    <div id="modalGrupo" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModalGrupo">&times;</span>
            <h2 id="modalTitulo" class="text-xl font-bold mb-4">Agregar Sección</h2>
            <form id="formGrupo">
                <div class="mb-4"><label class="block text-sm font-medium text-gray-700 mb-1">Institución *</label><select id="grupoInstitucion" required class="w-full border rounded-lg p-2"></select></div>
                <div class="mb-4"><label class="block text-sm font-medium text-gray-700 mb-1">Sección *</label><input type="text" id="grupoSeccion" placeholder="Ej: 1-1" required class="w-full border rounded-lg p-2"></div>
                <div class="mb-4"><label class="block text-sm font-medium text-gray-700 mb-1">Nivel *</label><select id="grupoNivel" required class="w-full border rounded-lg p-2">
                    <option value="I Ciclo (1°-3°)">I Ciclo (1°-3°)</option>
                    <option value="II Ciclo (4°-6°)">II Ciclo (4°-6°)</option>
                    <option value="III Ciclo (7°-9°)">III Ciclo (7°-9°)</option>
                    <option value="Diversificada (10°-12°)">Diversificada (10°-12°)</option>
                    <option value="Educación Adultos">Educación Adultos (CINDEA/IPEC)</option>
                    <option value="Educación Especial">Educación Especial</option>
                </select></div>
                <div class="mb-4"><label class="block text-sm font-medium text-gray-700 mb-1">Año *</label><select id="grupoAnio" required class="w-full border rounded-lg p-2"></select></div>
                <div id="periodosContainer" class="mb-4"><label class="block text-sm font-medium text-gray-700 mb-2">Períodos</label><div id="periodosLista"></div></div>
                <div class="mb-4"><label class="block text-sm font-medium text-gray-700 mb-1">Días de ausencia injustificada para alertas</label><input type="number" id="grupoDiasAlerta" value="3" class="w-full border rounded-lg p-2"></div>
                <div class="flex justify-end gap-3"><button type="submit" class="bg-green-800 text-white px-5 py-2 rounded-lg hover:bg-green-900">Guardar</button><button type="button" id="cancelarGrupoBtn" class="bg-gray-200 text-gray-800 px-5 py-2 rounded-lg hover:bg-gray-300">Cancelar</button></div>
            </form>
        </div>
    </div>

    <script type="module">
        import { openDB, getAll, put, remove, getById } from './js/db.js';

        let db;
        let currentGroupId = null;

        // Datos de ejemplo predefinidos
        const datosEjemplo = {
            centros: [{ id: 1001, nombre: 'Escuela Tranquilino Sáenz Rojas', codigo: 'CE1', activo: true }],
            years: [{ id: 2026, nombre: '2026', activo: true }],
            periodos: [
                { id: 1, schoolYearId: 2026, nombre: 'I Semestre', tipo: 'semestre', fechaInicio: '2026-02-23', fechaFin: '2026-07-03', activo: true, porcentajeAnual: 50 },
                { id: 2, schoolYearId: 2026, nombre: 'II Semestre', tipo: 'semestre', fechaInicio: '2026-07-20', fechaFin: '2026-12-09', activo: true, porcentajeAnual: 50 }
            ]
        };

        async function cargarDatosEjemplo() {
            const centros = await getAll('centros_educativos');
            if (centros.length === 0) {
                for (let c of datosEjemplo.centros) await put('centros_educativos', c);
            }
            const years = await getAll('school_years');
            if (years.length === 0) {
                for (let y of datosEjemplo.years) await put('school_years', y);
            }
            const periodos = await getAll('periods_enhanced');
            if (periodos.length === 0) {
                for (let p of datosEjemplo.periodos) await put('periods_enhanced', p);
            }
        }

        async function cargarSelects() {
            const centros = await getAll('centros_educativos');
            const selectInst = document.getElementById('grupoInstitucion');
            selectInst.innerHTML = centros.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
            const anios = await getAll('school_years');
            const selectAnio = document.getElementById('grupoAnio');
            selectAnio.innerHTML = anios.map(a => `<option value="${a.id}">${a.nombre}</option>`).join('');
        }

        async function cargarPeriodos(yearId) {
            const periodos = await getAll('periods_enhanced');
            const filtrados = periodos.filter(p => p.schoolYearId == yearId);
            const container = document.getElementById('periodosLista');
            if (filtrados.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-sm">No hay períodos configurados para este año.</p>';
                return;
            }
            container.innerHTML = filtrados.map(p => `
                <div class="periodo-item">
                    <div class="font-medium">${p.nombre}</div>
                    <div class="text-sm text-gray-600">${p.fechaInicio || 'sin fecha'} - ${p.fechaFin || 'sin fecha'}</div>
                    <div class="mt-2"><label class="text-sm">% en nota anual</label><input type="number" class="porcentaje-periodo w-24 ml-2 border rounded p-1" data-id="${p.id}" value="${p.porcentajeAnual || 0}" step="1" min="0" max="100"></div>
                </div>
            `).join('');
        }

        document.getElementById('grupoAnio').addEventListener('change', (e) => cargarPeriodos(e.target.value));

        async function renderGrupos() {
            const grupos = await getAll('groups');
            const centros = await getAll('centros_educativos');
            const container = document.getElementById('gruposContainer');
            if (grupos.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-gray-500 py-8">No hay secciones. Crea una nueva.</div>';
                return;
            }
            container.innerHTML = grupos.map(g => {
                const centro = centros.find(c => c.id == g.centroId);
                return `
                    <div class="bg-white rounded-xl shadow-md border border-gray-200 p-5 group-card">
                        <div class="flex justify-between items-start"><h3 class="text-xl font-semibold text-gray-800">${g.seccion}</h3><span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">${g.anio}</span></div>
                        <div class="mt-2 text-sm text-gray-600"><i class="fas fa-school w-4 text-green-700"></i> ${centro ? centro.nombre : ''}</div>
                        <div class="mt-1 text-sm text-gray-600"><i class="fas fa-graduation-cap w-4 text-green-700"></i> ${g.nivel}</div>
                        <div class="flex gap-2 mt-4 border-t pt-3">
                            <button class="ver-estudiantes text-sm bg-gray-100 hover:bg-gray-200 rounded-full px-3 py-1 transition" data-id="${g.id}"><i class="fas fa-users"></i> Ver estudiantes</button>
                            <button class="editar-grupo text-sm bg-gray-100 hover:bg-gray-200 rounded-full px-3 py-1 transition" data-id="${g.id}"><i class="fas fa-edit"></i> Editar</button>
                            <button class="eliminar-grupo text-sm bg-red-100 hover:bg-red-200 text-red-700 rounded-full px-3 py-1 transition" data-id="${g.id}"><i class="fas fa-trash-alt"></i> Eliminar</button>
                        </div>
                        <div class="flex flex-wrap gap-2 mt-3 pt-2 border-t">
                            ${['asistencia','estudiantes','calificaciones','pruebas','tareas','proyecto','portafolio','cotidiano','horario','ver-detalle','eliminar-grupo'].map(acc => `<button class="group-action-btn" data-action="${acc}" data-id="${g.id}"><i class="fas ${acc === 'asistencia' ? 'fa-calendar-check' : acc === 'estudiantes' ? 'fa-user-graduate' : acc === 'calificaciones' ? 'fa-chart-line' : acc === 'pruebas' ? 'fa-pen' : acc === 'tareas' ? 'fa-tasks' : acc === 'proyecto' ? 'fa-project-diagram' : acc === 'portafolio' ? 'fa-folder-open' : acc === 'cotidiano' ? 'fa-chalkboard-user' : acc === 'horario' ? 'fa-clock' : acc === 'ver-detalle' ? 'fa-chart-simple' : 'fa-trash'}"></i> ${acc.replace('-',' ')}</button>`).join('')}
                        </div>
                    </div>
                `;
            }).join('');
            attachCardEvents();
        }

        function attachCardEvents() {
            document.querySelectorAll('.editar-grupo').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = parseInt(btn.dataset.id);
                    const grupos = await getAll('groups');
                    const grupo = grupos.find(g => g.id === id);
                    if (grupo) abrirModalEdicion(grupo);
                });
            });
            document.querySelectorAll('.eliminar-grupo').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = parseInt(btn.dataset.id);
                    if (confirm('¿Eliminar esta sección? Se perderán todos los datos asociados.')) {
                        await remove('groups', id);
                        await renderGrupos();
                    }
                });
            });
            document.querySelectorAll('.group-action-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const action = btn.dataset.action;
                    const id = btn.dataset.id;
                    alert(`Funcionalidad: ${action} para el grupo ${id} (en desarrollo)`);
                });
            });
        }

        function abrirModalEdicion(grupo = null) {
            currentGroupId = grupo ? grupo.id : null;
            document.getElementById('modalTitulo').innerText = grupo ? 'Editar Sección' : 'Agregar Sección';
            cargarSelects();
            if (grupo) {
                document.getElementById('grupoInstitucion').value = grupo.centroId;
                document.getElementById('grupoSeccion').value = grupo.seccion;
                document.getElementById('grupoNivel').value = grupo.nivel;
                document.getElementById('grupoAnio').value = grupo.anioId;
                document.getElementById('grupoDiasAlerta').value = grupo.diasAlerta || 3;
                cargarPeriodos(grupo.anioId).then(() => {
                    if (grupo.periodosPorcentajes) {
                        Object.entries(grupo.periodosPorcentajes).forEach(([id, val]) => {
                            const input = document.querySelector(`.porcentaje-periodo[data-id="${id}"]`);
                            if (input) input.value = val;
                        });
                    }
                });
            } else {
                document.getElementById('formGrupo').reset();
                cargarPeriodos(document.getElementById('grupoAnio').value);
            }
            document.getElementById('modalGrupo').style.display = 'block';
        }

        document.getElementById('formGrupo').addEventListener('submit', async (e) => {
            e.preventDefault();
            const centroId = parseInt(document.getElementById('grupoInstitucion').value);
            const seccion = document.getElementById('grupoSeccion').value.trim();
            const nivel = document.getElementById('grupoNivel').value;
            const anioId = parseInt(document.getElementById('grupoAnio').value);
            const diasAlerta = parseInt(document.getElementById('grupoDiasAlerta').value) || 3;
            const anioObj = await getById('school_years', anioId);
            const periodosPorcentajes = {};
            document.querySelectorAll('.porcentaje-periodo').forEach(inp => { periodosPorcentajes[inp.dataset.id] = parseInt(inp.value) || 0; });
            const grupo = {
                id: currentGroupId || Date.now(),
                centroId,
                seccion,
                nivel,
                anioId,
                anio: anioObj.nombre,
                diasAlerta,
                periodosPorcentajes,
                createdAt: new Date().toISOString()
            };
            await put('groups', grupo);
            await renderGrupos();
            closeModal();
        });

        function closeModal() { document.getElementById('modalGrupo').style.display = 'none'; currentGroupId = null; }
        document.getElementById('closeModalGrupo').onclick = closeModal;
        document.getElementById('cancelarGrupoBtn').onclick = closeModal;

        // Exportar respaldo (todos los stores)
        async function exportarBackup() {
            const stores = ['centros_educativos', 'school_years', 'periods_enhanced', 'components', 'groups', 'students', 'attendance', 'grades'];
            const backup = {};
            for (let store of stores) {
                backup[store] = await getAll(store);
            }
            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pnft_backup_${new Date().toISOString().slice(0,19)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert('Respaldo exportado correctamente.');
        }

        // Importar respaldo
        async function importarBackup(file) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const backup = JSON.parse(e.target.result);
                    for (let [storeName, data] of Object.entries(backup)) {
                        if (!data.length) continue;
                        for (let item of data) {
                            await put(storeName, item);
                        }
                    }
                    alert('Respaldo importado correctamente.');
                    await renderGrupos();
                } catch (err) {
                    alert('Error al importar el archivo: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        document.getElementById('exportBackupBtn').onclick = exportarBackup;
        document.getElementById('importBackupBtn').onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            input.onchange = (e) => { if (e.target.files[0]) importarBackup(e.target.files[0]); };
            input.click();
        };
        document.getElementById('agregarSeccionBtn').onclick = () => abrirModalEdicion();
        document.getElementById('limpiarFiltrosBtn').onclick = () => { document.getElementById('filtroInstitucion').value = 'todos'; document.getElementById('filtroNivel').value = 'todos'; renderGrupos(); };

        // Filtros
        async function aplicarFiltros() {
            const instId = document.getElementById('filtroInstitucion').value;
            const nivel = document.getElementById('filtroNivel').value;
            let grupos = await getAll('groups');
            if (instId !== 'todos') grupos = grupos.filter(g => g.centroId == instId);
            if (nivel !== 'todos') grupos = grupos.filter(g => g.nivel === nivel);
            const container = document.getElementById('gruposContainer');
            if (grupos.length === 0) { container.innerHTML = '<div class="col-span-full text-center text-gray-500 py-8">No hay secciones.</div>'; return; }
            const centros = await getAll('centros_educativos');
            container.innerHTML = grupos.map(g => {
                const centro = centros.find(c => c.id == g.centroId);
                return `
                    <div class="bg-white rounded-xl shadow-md border border-gray-200 p-5 group-card">
                        <div class="flex justify-between items-start"><h3 class="text-xl font-semibold text-gray-800">${g.seccion}</h3><span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">${g.anio}</span></div>
                        <div class="mt-2 text-sm text-gray-600"><i class="fas fa-school"></i> ${centro ? centro.nombre : ''}</div>
                        <div class="mt-1 text-sm text-gray-600"><i class="fas fa-graduation-cap"></i> ${g.nivel}</div>
                        <div class="flex gap-2 mt-4 border-t pt-3">
                            <button class="ver-estudiantes text-sm bg-gray-100 hover:bg-gray-200 rounded-full px-3 py-1 transition" data-id="${g.id}"><i class="fas fa-users"></i> Ver estudiantes</button>
                            <button class="editar-grupo text-sm bg-gray-100 hover:bg-gray-200 rounded-full px-3 py-1 transition" data-id="${g.id}"><i class="fas fa-edit"></i> Editar</button>
                            <button class="eliminar-grupo text-sm bg-red-100 hover:bg-red-200 text-red-700 rounded-full px-3 py-1 transition" data-id="${g.id}"><i class="fas fa-trash-alt"></i> Eliminar</button>
                        </div>
                        <div class="flex flex-wrap gap-2 mt-3 pt-2 border-t">
                            ${['asistencia','estudiantes','calificaciones','pruebas','tareas','proyecto','portafolio','cotidiano','horario','ver-detalle','eliminar-grupo'].map(acc => `<button class="group-action-btn" data-action="${acc}" data-id="${g.id}"><i class="fas ${acc === 'asistencia' ? 'fa-calendar-check' : acc === 'estudiantes' ? 'fa-user-graduate' : acc === 'calificaciones' ? 'fa-chart-line' : acc === 'pruebas' ? 'fa-pen' : acc === 'tareas' ? 'fa-tasks' : acc === 'proyecto' ? 'fa-project-diagram' : acc === 'portafolio' ? 'fa-folder-open' : acc === 'cotidiano' ? 'fa-chalkboard-user' : acc === 'horario' ? 'fa-clock' : acc === 'ver-detalle' ? 'fa-chart-simple' : 'fa-trash'}"></i> ${acc.replace('-',' ')}</button>`).join('')}
                        </div>
                    </div>
                `;
            }).join('');
            attachCardEvents();
        }

        document.getElementById('filtroInstitucion').addEventListener('change', aplicarFiltros);
        document.getElementById('filtroNivel').addEventListener('change', aplicarFiltros);

        async function cargarFiltros() {
            const centros = await getAll('centros_educativos');
            const filtroInst = document.getElementById('filtroInstitucion');
            filtroInst.innerHTML = '<option value="todos">Todas las Instituciones</option>' + centros.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
            const grupos = await getAll('groups');
            const niveles = [...new Set(grupos.map(g => g.nivel))];
            const filtroNivel = document.getElementById('filtroNivel');
            filtroNivel.innerHTML = '<option value="todos">Todos los Niveles</option>' + niveles.map(n => `<option value="${n}">${n}</option>`).join('');
        }

        // Inicialización
        await openDB();
        await cargarDatosEjemplo();
        await cargarFiltros();
        await renderGrupos();
    </script>
</body>
</html>
