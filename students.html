<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Estudiantes - PNFT</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-content">
        <h1>Estudiantes</h1>
        
        <div class="card">
            <div class="card-title">Agregar estudiante manualmente</div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Nombre completo</label>
                    <input type="text" id="nombreEst">
                </div>
                <div class="form-group">
                    <label>Grupo</label>
                    <select id="grupoEst">
                        <!-- Llenar con grupos -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Email encargado</label>
                    <input type="email" id="emailEst">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="telEst">
                </div>
                <div class="form-group">
                    <label>Adecuación curricular</label>
                    <select id="adecuacionEst">
                        <option value="no">No</option>
                        <option value="si">Sí</option>
                    </select>
                </div>
            </div>
            <button onclick="agregarEstudiante()">➕ Agregar</button>
        </div>
        
        <div class="card">
            <div class="card-title">Importar desde Excel</div>
            <input type="file" id="excelFile" accept=".xlsx, .xls, .csv">
            <button onclick="importarExcel()">📥 Importar</button>
            <p style="margin-top:10px; font-size:0.9rem; color:#666;">Formato: columnas con nombre, grupo, email, teléfono (opcional)</p>
        </div>
        
        <div class="card">
            <div class="card-title">Lista de estudiantes</div>
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Grupo</th>
                        <th>Contacto</th>
                        <th>Adecuación</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaEstudiantes">
                    <!-- Llenar dinámicamente -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        (function() {
            const grupoSelect = document.getElementById('grupoEst');
            
            async function cargarGrupos() {
                const grupos = await window.dbAPI.obtenerGrupos();
                grupoSelect.innerHTML = grupos.map(g => `<option value="${g.id}">${g.nombre}</option>`).join('');
                actualizarLista();
            }
            cargarGrupos();
            
            window.agregarEstudiante = async function() {
                const nombre = document.getElementById('nombreEst').value;
                const grupoId = grupoSelect.value;
                const email = document.getElementById('emailEst').value;
                const telefono = document.getElementById('telEst').value;
                const adecuacion = document.getElementById('adecuacionEst').value;
                
                if (!nombre || !grupoId) {
                    alert('Nombre y grupo son obligatorios');
                    return;
                }
                
                const estudiante = {
                    id: Date.now(),
                    nombre,
                    grupoId,
                    email,
                    telefono,
                    adecuacion
                };
                
                await window.dbAPI.guardarEstudiante(estudiante);
                alert('✅ Estudiante agregado');
                actualizarLista();
                // Limpiar campos
                document.getElementById('nombreEst').value = '';
                document.getElementById('emailEst').value = '';
                document.getElementById('telEst').value = '';
            };
            
            window.importarExcel = async function() {
                const fileInput = document.getElementById('excelFile');
                const file = fileInput.files[0];
                if (!file) return alert('Selecciona un archivo Excel o CSV');
                
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                        
                        // Asumimos que la primera fila son encabezados
                        const headers = rows[0];
                        const nombreIdx = headers.findIndex(h => h.toLowerCase().includes('nombre'));
                        const grupoIdx = headers.findIndex(h => h.toLowerCase().includes('grupo'));
                        const emailIdx = headers.findIndex(h => h.toLowerCase().includes('email'));
                        const telIdx = headers.findIndex(h => h.toLowerCase().includes('tel'));
                        
                        if (nombreIdx === -1 || grupoIdx === -1) {
                            alert('El archivo debe tener columnas "nombre" y "grupo"');
                            return;
                        }
                        
                        const grupos = await window.dbAPI.obtenerGrupos();
                        const grupoMap = Object.fromEntries(grupos.map(g => [g.nombre, g.id]));
                        
                        let agregados = 0;
                        for (let i = 1; i < rows.length; i++) {
                            const row = rows[i];
                            if (!row[nombreIdx]) continue;
                            
                            const grupoNombre = row[grupoIdx]?.toString().trim();
                            const grupoId = grupoMap[grupoNombre];
                            if (!grupoId) continue; // Si no existe el grupo, se omite
                            
                            const estudiante = {
                                id: Date.now() + i,
                                nombre: row[nombreIdx],
                                grupoId,
                                email: row[emailIdx] || '',
                                telefono: row[telIdx] || '',
                                adecuacion: 'no'
                            };
                            await window.dbAPI.guardarEstudiante(estudiante);
                            agregados++;
                        }
                        alert(`✅ ${agregados} estudiantes importados correctamente`);
                        actualizarLista();
                    } catch (error) {
                        alert('Error al procesar el archivo: ' + error.message);
                    }
                };
                reader.readAsArrayBuffer(file);
            };
            
            async function actualizarLista() {
                const estudiantes = await window.dbAPI.obtenerEstudiantes();
                const grupos = await window.dbAPI.obtenerGrupos();
                const grupoMap = Object.fromEntries(grupos.map(g => [g.id, g.nombre]));
                
                const tbody = document.getElementById('tablaEstudiantes');
                tbody.innerHTML = estudiantes.map(e => `
                    <tr>
                        <td>${e.nombre}</td>
                        <td>${grupoMap[e.grupoId] || 'Desconocido'}</td>
                        <td>${e.email || ''} ${e.telefono ? '/ ' + e.telefono : ''}</td>
                        <td>${e.adecuacion === 'si' ? 'Sí' : 'No'}</td>
                        <td><button class="secondary" onclick="eliminarEstudiante(${e.id})">🗑️</button></td>
                    </tr>
                `).join('');
            }
            
            window.eliminarEstudiante = async function(id) {
                if (confirm('¿Eliminar este estudiante?')) {
                    await window.dbAPI.eliminar('students', id);
                    actualizarLista();
                }
            };
        })();
    </script>
</body>
</html>
