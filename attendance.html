<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Asistencia - PNFT Articulador</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .sidebar { background: linear-gradient(180deg, #1e5a20 0%, #2E7D32 100%); }
        .nav-item.active { background: white; color: #2E7D32; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.2); }
        .nav-item.active i { color: #2E7D32; }
        .btn-accion { background: #2E7D32; transition: all 0.2s; }
        .btn-accion:hover { background: #1e5a20; transform: translateY(-2px); }
        .btn-secundario { background: #f0f0f0; color: #333; border: 1px solid #ccc; }
        .btn-secundario:hover { background: #e0e0e0; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .filter-group label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.25rem; }
        .filter-group select, .filter-group input { width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.5rem; }
        .attendance-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .attendance-table th, .attendance-table td { border: 1px solid #e2e8f0; padding: 0.5rem; text-align: left; }
        .attendance-table th { background: #f1f5f9; font-weight: 600; }
        .badge-presente { background: #e8f5e9; color: #2e7d32; padding: 0.2rem 0.5rem; border-radius: 20px; display: inline-block; font-size: 0.75rem; }
        .badge-ausente { background: #ffebee; color: #c62828; padding: 0.2rem 0.5rem; border-radius: 20px; display: inline-block; font-size: 0.75rem; }
        .badge-ausente_injustificado { background: #ffebee; color: #c62828; padding: 0.2rem 0.5rem; border-radius: 20px; display: inline-block; font-size: 0.75rem; }
        .badge-incapacidad { background: #fff3e0; color: #e65100; padding: 0.2rem 0.5rem; border-radius: 20px; display: inline-block; font-size: 0.75rem; }
        .badge-tarde { background: #fff3e0; color: #e65100; padding: 0.2rem 0.5rem; border-radius: 20px; display: inline-block; font-size: 0.75rem; }
        .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
        .pagination button { padding: 0.25rem 0.75rem; border: 1px solid #ccc; border-radius: 0.375rem; background: white; cursor: pointer; }
        .pagination button.active { background: #2E7D32; color: white; border-color: #2E7D32; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="font-sans antialiased">
    <div class="flex min-h-screen">
        <!-- Sidebar (igual que en otras páginas) -->
        <aside class="w-72 bg-gradient-to-b from-green-800 to-green-700 text-white flex-shrink-0 sticky top-0 h-screen overflow-y-auto">
            <div class="text-center py-8 border-b border-white/20">
                <div class="w-20 h-20 bg-white/10 rounded-full flex items-center justify-center text-3xl font-bold mx-auto mb-4 border-2 border-white/20">PNFT</div>
                <h2 class="text-xl font-semibold">Articulador 2026</h2>
                <p class="text-sm opacity-80">MEP Costa Rica</p>
            </div>
            <ul class="mt-6 space-y-1 px-4">
                <a href="index.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10"><i class="fas fa-chart-pie w-5"></i> Tablero</li></a>
                <a href="planning.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10"><i class="fas fa-clipboard-list w-5"></i> Planeamiento</li></a>
                <a href="progresion.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10"><i class="fas fa-road w-5"></i> Progresión</li></a>
                <a href="evaluation.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10"><i class="fas fa-check-circle w-5"></i> Evaluación</li></a>
                <a href="logbook.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10"><i class="fas fa-book-open w-5"></i> Bitácora</li></a>
                <a href="students.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10"><i class="fas fa-users w-5"></i> Estudiantes</li></a>
                <a href="groups.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10"><i class="fas fa-layer-group w-5"></i> Grupos</li></a>
                <a href="subjects.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10"><i class="fas fa-book w-5"></i> Asignaturas</li></a>
                <a href="attendance.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl bg-white text-green-800 font-semibold shadow-md"><i class="fas fa-calendar-check w-5"></i> Reporte Asistencia</li></a>
                <a href="settings.html"><li class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10"><i class="fas fa-cog w-5"></i> Configuración</li></a>
            </ul>
        </aside>

        <main class="flex-1 p-8 bg-gray-50">
            <div class="flex justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm">
                <h1 class="text-2xl font-bold text-gray-800">Reporte de Asistencia</h1>
                <div class="flex gap-4">
                    <span class="bg-green-100 text-green-800 px-4 py-2 rounded-full text-sm font-medium flex items-center gap-2"><i class="fas fa-user-graduate"></i> Docente</span>
                    <span class="bg-green-100 text-green-800 px-4 py-2 rounded-full text-sm font-medium flex items-center gap-2"><i class="fas fa-calendar-alt"></i> 2026</span>
                </div>
            </div>

            <!-- Filtros -->
            <div class="bg-white p-6 border border-gray-200 rounded-xl shadow-sm mb-8">
                <div class="filter-grid">
                    <div class="filter-group">
                        <label>Fecha desde</label>
                        <input type="date" id="fechaDesde">
                    </div>
                    <div class="filter-group">
                        <label>Fecha hasta</label>
                        <input type="date" id="fechaHasta">
                    </div>
                    <div class="filter-group">
                        <label>Sección</label>
                        <select id="filtroGrupo"><option value="">Todas las secciones</option></select>
                    </div>
                    <div class="filter-group">
                        <label>Asignatura</label>
                        <select id="filtroAsignatura"><option value="">Todas las asignaturas</option></select>
                    </div>
                    <div class="filter-group">
                        <label>Lección</label>
                        <input type="text" id="filtroLeccion" placeholder="Ej: 1, 2, 3...">
                    </div>
                    <div class="filter-group">
                        <label>Estudiante</label>
                        <input type="text" id="filtroEstudiante" placeholder="Nombre o cédula">
                    </div>
                </div>
                <div class="flex justify-end gap-2">
                    <button id="filtrarBtn" class="bg-green-800 text-white px-4 py-2 rounded-lg hover:bg-green-900"><i class="fas fa-search"></i> Filtrar</button>
                    <button id="limpiarBtn" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-lg hover:bg-gray-300">Borrar Filtros</button>
                    <button id="exportExcelBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700"><i class="fas fa-file-excel"></i> Descargar Excel</button>
                </div>
            </div>

            <!-- Contenedor de tabla y paginación -->
            <div class="bg-white p-6 border border-gray-200 rounded-xl shadow-sm overflow-x-auto">
                <div id="tablaContainer"></div>
                <div id="paginacion" class="pagination"></div>

                <!-- Controles de edición masiva -->
                <div class="mt-4 flex flex-wrap items-center gap-2">
                    <label for="estadoGlobal" class="font-semibold">Cambiar estado de todos:</label>
                    <select id="estadoGlobal" class="border rounded px-3 py-1">
                        <option value="">Seleccione un estado</option>
                        <option value="presente">Presente</option>
                        <option value="ausente">Ausente</option>
                        <option value="ausente_injustificado">Ausencia Injustificada</option>
                        <option value="incapacidad">Incapacidad</option>
                        <option value="tarde">Tarde</option>
                    </select>
                    <button id="aplicarTodosBtn" class="bg-cyan-800 text-white px-4 py-1 rounded hover:bg-cyan-900">Aplicar a todos</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { openDB, getAll, put, remove, getById } from './js/db.js';

        let db;
        let grupos = [];
        let asignaturas = [];
        let estudiantes = [];
        let asistencias = [];

        // Elementos DOM
        const fechaDesde = document.getElementById('fechaDesde');
        const fechaHasta = document.getElementById('fechaHasta');
        const filtroGrupo = document.getElementById('filtroGrupo');
        const filtroAsignatura = document.getElementById('filtroAsignatura');
        const filtroLeccion = document.getElementById('filtroLeccion');
        const filtroEstudiante = document.getElementById('filtroEstudiante');
        const filtrarBtn = document.getElementById('filtrarBtn');
        const limpiarBtn = document.getElementById('limpiarBtn');
        const exportExcelBtn = document.getElementById('exportExcelBtn');
        const tablaContainer = document.getElementById('tablaContainer');
        const paginacionDiv = document.getElementById('paginacion');
        const estadoGlobal = document.getElementById('estadoGlobal');
        const aplicarTodosBtn = document.getElementById('aplicarTodosBtn');

        let resultadosFiltrados = [];
        let paginaActual = 1;
        const itemsPorPagina = 20;

        // Cargar datos iniciales
        async function cargarDatos() {
            grupos = await getAll('groups');
            asignaturas = await getAll('subjects');
            estudiantes = await getAll('students');
            asistencias = await getAll('attendance');

            // Llenar selects de filtros
            filtroGrupo.innerHTML = '<option value="">Todas las secciones</option>' +
                grupos.map(g => `<option value="${g.id}">${g.seccion} (${g.nivel}) - ${g.anio}</option>`).join('');

            filtroAsignatura.innerHTML = '<option value="">Todas las asignaturas</option>' +
                asignaturas.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
        }

        // Aplicar filtros a la lista de asistencias
        function aplicarFiltros() {
            let filtered = [...asistencias];

            // Fecha desde
            if (fechaDesde.value) {
                const desde = new Date(fechaDesde.value);
                filtered = filtered.filter(a => new Date(a.fecha) >= desde);
            }
            // Fecha hasta
            if (fechaHasta.value) {
                const hasta = new Date(fechaHasta.value);
                hasta.setHours(23, 59, 59);
                filtered = filtered.filter(a => new Date(a.fecha) <= hasta);
            }
            // Grupo
            const grupoId = filtroGrupo.value;
            if (grupoId) {
                filtered = filtered.filter(a => a.groupId == grupoId);
            }
            // Asignatura (si existe el campo subjectId)
            const asignaturaId = filtroAsignatura.value;
            if (asignaturaId) {
                filtered = filtered.filter(a => a.subjectId == asignaturaId);
            }
            // Lección
            const leccion = filtroLeccion.value.trim();
            if (leccion) {
                filtered = filtered.filter(a => a.lesson == leccion);
            }
            // Estudiante (nombre o cédula)
            const nombreEst = filtroEstudiante.value.trim().toLowerCase();
            if (nombreEst) {
                const idsEstudiantes = estudiantes
                    .filter(e => e.nombre.toLowerCase().includes(nombreEst) || (e.id_number && e.id_number.includes(nombreEst)))
                    .map(e => e.id);
                filtered = filtered.filter(a => idsEstudiantes.includes(a.estudianteId));
            }

            resultadosFiltrados = filtered;
            paginaActual = 1;
            renderTabla();
        }

        // Renderizar tabla con paginación
        function renderTabla() {
            const start = (paginaActual - 1) * itemsPorPagina;
            const paginated = resultadosFiltrados.slice(start, start + itemsPorPagina);

            if (paginated.length === 0) {
                tablaContainer.innerHTML = '<div class="text-center text-gray-500 py-8">No hay registros con los filtros seleccionados.</div>';
                paginacionDiv.innerHTML = '';
                return;
            }

            // Mapeos para nombres
            const grupoMap = new Map(grupos.map(g => [g.id, g]));
            const estudianteMap = new Map(estudiantes.map(e => [e.id, e]));
            const asignaturaMap = new Map(asignaturas.map(a => [a.id, a]));

            let html = '<table class="attendance-table"><thead><tr>';
            html += '<th>Fecha</th><th>Estudiante</th><th>Sección</th><th>Asignatura</th><th>Lección</th><th>Estado</th><th>Modificar</th>';
            html += '</tr></thead><tbody>';

            for (let a of paginated) {
                const grupo = grupoMap.get(a.groupId);
                const estudiante = estudianteMap.get(a.estudianteId);
                const asignatura = a.subjectId ? asignaturaMap.get(a.subjectId) : null;
                const estadoLabel = a.estado === 'presente' ? 'Presente' :
                                    a.estado === 'ausente' ? 'Ausente' :
                                    a.estado === 'ausente_injustificado' ? 'Ausencia Injustificada' :
                                    a.estado === 'incapacidad' ? 'Incapacidad' : 'Tarde';
                const estadoClass = `badge-${a.estado === 'presente' ? 'presente' : (a.estado === 'ausente' || a.estado === 'ausente_injustificado' ? 'ausente' : (a.estado === 'incapacidad' ? 'incapacidad' : 'tarde'))}`;

                html += `<tr data-id="${a.id}">`;
                html += `<td>${a.fecha}</td>`;
                html += `<td>${estudiante ? escapeHtml(estudiante.nombre) : '—'}</td>`;
                html += `<td>${grupo ? grupo.seccion : '—'}</td>`;
                html += `<td>${asignatura ? escapeHtml(asignatura.name) : '—'}</td>`;
                html += `<td>${a.lesson || '—'}</td>`;
                html += `<td><span class="${estadoClass}">${estadoLabel}</span></td>`;
                html += `<td><select class="estado-select" data-id="${a.id}" style="width:100%">`;
                html += `<option value="presente" ${a.estado === 'presente' ? 'selected' : ''}>Presente</option>`;
                html += `<option value="ausente" ${a.estado === 'ausente' ? 'selected' : ''}>Ausente</option>`;
                html += `<option value="ausente_injustificado" ${a.estado === 'ausente_injustificado' ? 'selected' : ''}>Ausencia Injustificada</option>`;
                html += `<option value="incapacidad" ${a.estado === 'incapacidad' ? 'selected' : ''}>Incapacidad</option>`;
                html += `<option value="tarde" ${a.estado === 'tarde' ? 'selected' : ''}>Tarde</option>`;
                html += `</select></td>`;
                html += `</tr>`;
            }
            html += '</tbody></table>';
            tablaContainer.innerHTML = html;

            // Asignar eventos a los selects
            document.querySelectorAll('.estado-select').forEach(select => {
                select.addEventListener('change', async (e) => {
                    const id = parseInt(select.dataset.id);
                    const nuevoEstado = select.value;
                    const registro = asistencias.find(a => a.id === id);
                    if (registro) {
                        registro.estado = nuevoEstado;
                        await put('attendance', registro);
                        // Actualizar la lista local y refrescar la vista
                        const index = asistencias.findIndex(a => a.id === id);
                        if (index !== -1) asistencias[index] = registro;
                        aplicarFiltros(); // refrescar tabla
                    }
                });
            });

            // Paginación
            const totalPages = Math.ceil(resultadosFiltrados.length / itemsPorPagina);
            let pagHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                pagHtml += `<button class="${i === paginaActual ? 'active' : ''}" data-page="${i}">${i}</button>`;
            }
            paginacionDiv.innerHTML = pagHtml;
            document.querySelectorAll('.pagination button').forEach(btn => {
                btn.addEventListener('click', () => {
                    paginaActual = parseInt(btn.dataset.page);
                    renderTabla();
                });
            });
        }

        // Cambiar estado de todos los registros filtrados
        async function aplicarEstadoATodos() {
            const nuevoEstado = estadoGlobal.value;
            if (!nuevoEstado) {
                alert('Seleccione un estado.');
                return;
            }
            if (!confirm(`¿Cambiar el estado de TODOS los ${resultadosFiltrados.length} registros visibles a "${nuevoEstado}"?`)) return;

            for (let registro of resultadosFiltrados) {
                registro.estado = nuevoEstado;
                await put('attendance', registro);
            }
            // Actualizar lista global
            for (let registro of resultadosFiltrados) {
                const idx = asistencias.findIndex(a => a.id === registro.id);
                if (idx !== -1) asistencias[idx] = registro;
            }
            aplicarFiltros();
            alert('Estados actualizados.');
        }

        // Exportar a Excel
        function exportarExcel() {
            if (resultadosFiltrados.length === 0) {
                alert('No hay datos para exportar.');
                return;
            }

            // Mapeos para nombres
            const grupoMap = new Map(grupos.map(g => [g.id, g]));
            const estudianteMap = new Map(estudiantes.map(e => [e.id, e]));
            const asignaturaMap = new Map(asignaturas.map(a => [a.id, a]));

            const data = [['Fecha', 'Estudiante', 'Sección', 'Asignatura', 'Lección', 'Estado']];
            for (let a of resultadosFiltrados) {
                const grupo = grupoMap.get(a.groupId);
                const estudiante = estudianteMap.get(a.estudianteId);
                const asignatura = a.subjectId ? asignaturaMap.get(a.subjectId) : null;
                const estadoLabel = a.estado === 'presente' ? 'Presente' :
                                    a.estado === 'ausente' ? 'Ausente' :
                                    a.estado === 'ausente_injustificado' ? 'Ausencia Injustificada' :
                                    a.estado === 'incapacidad' ? 'Incapacidad' : 'Tarde';
                data.push([
                    a.fecha,
                    estudiante ? estudiante.nombre : '—',
                    grupo ? grupo.seccion : '—',
                    asignatura ? asignatura.name : '—',
                    a.lesson || '—',
                    estadoLabel
                ]);
            }
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Asistencia');
            XLSX.writeFile(wb, `asistencia_${new Date().toISOString().slice(0,19)}.xlsx`);
        }

        function limpiarFiltros() {
            fechaDesde.value = '';
            fechaHasta.value = '';
            filtroGrupo.value = '';
            filtroAsignatura.value = '';
            filtroLeccion.value = '';
            filtroEstudiante.value = '';
            aplicarFiltros();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        // Inicialización
        async function init() {
            await openDB();
            await cargarDatos();
            aplicarFiltros();
        }

        filtrarBtn.addEventListener('click', aplicarFiltros);
        limpiarBtn.addEventListener('click', limpiarFiltros);
        exportExcelBtn.addEventListener('click', exportarExcel);
        aplicarTodosBtn.addEventListener('click', aplicarEstadoATodos);

        init();
    </script>
</body>
</html>
